name: CI

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*a[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*b[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*rc[0-9]*'
    branches:
      - master
      - next2024
  pull_request:
    branches:
      - master
      - next2024
  schedule:
    - cron: "9 16 * * 1"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.7", "3.9", "3.11", "3.13"]
        pydantic-version: ["1", "2"]
        # runs-on: [ubuntu-latest, windows-latest]
        runs-on: [ubuntu-22.04, windows-latest]  # until drop py37
        exclude:
          - runs-on: windows-latest
            pydantic-version: "1"
          - runs-on: windows-latest
            python-version: "3.7"
    name: "🐍 ${{ matrix.python-version }} • ${{ matrix.pydantic-version }} • ${{ matrix.runs-on }}"
    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Install poetry
        run: pip install poetry
      # Force pydantic 1.0 by modifying poetry dep "pydantic" string with in-place sed
      # -i is zero-length extension which does effectively in-place sub.
      # Can't do -i '' because Ubuntu sed is -i{suffix} whereas OSX sed is -i {suffix}... ugh
      # ^ start of line, pydantic, optional spaces and > sign, capture the version, replace with ^{version}
      # Should avoid also replacing the autodoc-pydantic spec later on.
      - name: Sed replace pydantic on repo
        if: matrix.pydantic-version == '1'
        run: |
          sed -i 's/^pydantic *= *">*= *\([0-9.]*\)"/pydantic = "^\1"/' pyproject.toml
      - name: Install repo with poetry (full deps)
        if: matrix.python-version != '3.9'
        run: poetry install --no-interaction --no-ansi --all-extras
      - name: Install repo with poetry (min deps)
        if: matrix.python-version == '3.9'
        run: poetry install --no-interaction --no-ansi --extras test
      - name: Run tests
        run: poetry run pytest -rws -v --cov=qcelemental --color=yes --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3 # NEEDS UPDATE TO v3 https://github.com/codecov/codecov-action
      - name: QCSchema Examples Deploy
        uses: JamesIves/github-pages-deploy-action@4.1.1
        #if: github.event_name == 'push' && github.repository == 'MolSSI/QCElemental' && ( startsWith( github.ref, 'refs/tags/' ) || github.ref == 'refs/heads/master' )
        if: false
        with:
          branch: qcschema-examples
          folder: qcelemental/tests/qcschema_instances

  build_documentation:
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        name: Set up Python
        with:
          python-version: "3.10"
      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2
      - name: Install poetry
        run: pip install poetry
      # Force pydantic 1.0 by modifying poetry dep "pydantic" string with in-place sed (see above for details)
      - name: Sed replace pydantic on repo
        run: |
          sed -i 's/^pydantic *= *">*= *\([0-9.]*\)"/pydantic = "^\1"/' pyproject.toml
      - name: Install repo
        run: poetry install --no-interaction --no-ansi
      - name: Build Documentation
        run: bash scripts/build_docs.sh
      # Decide where to deploy: dev/ for master, <tag>/ for tags
      - name: Compute docs deploy target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          echo GITHUB_REF_TYPE ${GITHUB_REF_TYPE}
          echo GITHUB_REF_NAME ${GITHUB_REF_NAME}
          echo GITHUB_REF ${GITHUB_REF}
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "target_folder=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version_label=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

          elif [[ "${GITHUB_REF_NAME}" == "master" || "${GITHUB_REF_NAME}" == "verdocs" ]]; then
            echo "target_folder=dev" >> "$GITHUB_OUTPUT"
            echo "version_label=dev" >> "$GITHUB_OUTPUT"

          else
            echo "target_folder=" >> "$GITHUB_OUTPUT"
            echo "version_label=" >> "$GITHUB_OUTPUT"
          fi
          echo GITHUB_OUTPUT ${GITHUB_OUTPUT}

      - name: GitHub Pages Deploy (versioned, keep old)
        uses: JamesIves/github-pages-deploy-action@v4
        if: github.event_name == 'push' && github.repository == 'MolSSI/QCElemental' && ( startsWith( github.ref, 'refs/tags/' ) || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/verdocs' )
        with:
          branch: gh-pages
          folder: build/docs/
          target-folder: ${{ steps.target.outputs.target_folder }}
          clean: false

      - name: Update versions.json
        if: github.event_name == 'push' && github.repository == 'MolSSI/QCElemental' && ( startsWith( github.ref, 'refs/tags/' ) || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/verdocs' )
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_LABEL: ${{ steps.target.outputs.version_label }}
          TARGET_FOLDER: ${{ steps.target.outputs.target_folder }}
        run: |
          set -euo pipefail
          rm -rf _ghp
          git clone --depth 1 --branch gh-pages "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" _ghp
          cd _ghp
          # Create versions.json if it doesn't exist yet
          if [[ ! -f versions.json ]]; then
            cat > versions.json <<'JSON'
          [
            {"label": "dev", "path": "dev/"},
            {"label": "v0.50.0rc1", "path": "v0.50.0rc1/"},
            {"label": "v0.30.1", "path": "v0.30.1/"}
          ]
          JSON
          fi
          python - <<'PY'
          import json, pathlib, os
          p = pathlib.Path("versions.json")
          data = json.loads(p.read_text())
          pinned = [
              {"label": "dev", "path": "dev/"},
              {"label": "v0.50.0rc1", "path": "v0.50.0rc1/"},
              {"label": "v0.30.1", "path": "v0.30.1/"},
          ]
          lbl = os.environ.get("VERSION_LABEL", "")
          tgt = os.environ.get("TARGET_FOLDER", "")
          if lbl and lbl not in ("dev",) and tgt:
              pinned.insert(1, {"label": lbl, "path": tgt.rstrip("/") + "/"})
          p.write_text(json.dumps(pinned, indent=2) + "\n")
          PY
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add versions.json
            git commit -m "docs: update versions.json (${GITHUB_REF})"
            git push origin gh-pages
          fi

